<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心跳指令客服合集</title>

  <!-- 重点：这里连接 css 文件 -->
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>

  <main class="page">

    <div class="top-text">CUSTOMER SERVICE</div>
    <h1 class="main-title">心跳指令客服合集</h1>
    <p class="main-desc">
      请选择需要联系的客服，点击名字即可跳转到对应企业微信联系页面。
    </p>

    <div class="service-wrapper">

      <!-- 男老板客服区 -->
      <section class="service-section male-section">
        <div class="section-header">
          <div>
            <span class="section-tag"></span>
            <h2>男宝宝联系我们</h2>
          </div>
          <p></p>
        </div>

        <div class="service-grid">
          <a class="service-card" href="https://work.weixin.qq.com/ca/cawcde8a758a1966ba" target="_self">
            <div>
              <h3>漫画 <span>7:00-13:00</span></h3>
              <p>男贵宾点击联系</p>
            </div>
            <span class="arrow">→</span>
          </a>

          <a class="service-card" href="https://work.weixin.qq.com/ca/cawcde6bb4bbe36cb9" target="_self">
            <div>
              <h3>比巴卜 <span>19:00-1:00</span></h3>
              <p>男贵宾点击联系</p>
            </div>
            <span class="arrow">→</span>
          </a>

          <a class="service-card" href="https://work.weixin.qq.com/ca/cawcdea60750e4181d" target="_self">
            <div>
              <h3>泡芙琳 <span>1:00-7:00</span></h3>
              <p>男贵宾点击联系</p>
            </div>
            <span class="arrow">→</span>
          </a>
        </div>
      </section>


      <!-- 女老板客服区 -->
      <section class="service-section female-section">
        <div class="section-header">
          <div>
            <span class="section-tag"></span>
            <h2>女宝宝联系我们</h2>
          </div>
          <p></p>
        </div>

        <div class="service-grid">
          <a class="service-card" href="https://work.weixin.qq.com/ca/cawcdeb15aa06b6c6e" target="_self">
            <div>
              <h3>心结 <span>19:00-7:00</span></h3>
              <p>女宝宝点击联系</p>
            </div>
            <span class="arrow">→</span>
          </a>

          <a class="service-card" href="https://work.weixin.qq.com/ca/cawcdec6cab25f925d" target="_self">
            <div>
              <h3>奶酪 <span>7:00-19:00</span></h3>
              <p>女宝宝点击联系</p>
            </div>
            <span class="arrow">→</span>
          </a>
        </div>
      </section>


      <!-- 推荐入口 -->
      <a class="service-card recommend-card" href="https://work.weixin.qq.com/ca/cawcdef829c614682b" target="_self">
        <div>
          <h3>心结 + 泡芙琳随机</h3>
          <p>推荐入口</p>
        </div>
        <span class="arrow">→</span>
      </a>

    </div>

    <p class="notice">请各位宝宝自行注意上班时间哦</p>

  </main>

</body>
</html>
